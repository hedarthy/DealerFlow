name: Morning Update (9:25 AM ET / 6:25 AM PT)
on:
  schedule:
    # 09:25 ET = 6:25 AM Pacific, ~5 min before the 9:30 ET open. The :25 slot is
    # deliberately off the top of the hour: GitHub's scheduler is best-effort and
    # heavily congested at :00/:10, so an odd minute tends to dispatch sooner (it is
    # still not a hard guarantee — see README). The market-day/hour gate keys off the
    # cron's SCHEDULED ET hour (9), so this dual EDT/EST pair still collapses to
    # exactly one real run per day year-round.
    - cron: '25 13 * * 1-5'   # 09:25 ET during EDT (summer) = 6:25 AM PT
    - cron: '25 14 * * 1-5'   # 09:25 ET during EST (winter) = 6:25 AM PT
  workflow_dispatch:
    inputs:
      force:
        description: 'Bypass the trading-day / ET-hour guard (run now regardless)'
        type: boolean
        default: true
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run morning mode
        run: python -m src.daily_options_agent --mode=morning ${{ (github.event_name == 'workflow_dispatch' && inputs.force) && '--force' || '' }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.OPTIONS_DISCORD_WEBHOOK_URL }}
          SCHEDULED_CRON: ${{ github.event.schedule }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: morning-report
          path: |
            report.md
            gex_heatmap_*.png
      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.OPTIONS_DISCORD_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -sf -H "Content-Type: application/json" -X POST \
            -d "{\"content\": \"❌ Morning screener run failed — see $RUN_URL\"}" \
            "$DISCORD_WEBHOOK_URL" || true
