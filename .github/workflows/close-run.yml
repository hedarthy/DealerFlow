name: Close Run (4:05 PM ET)
on:
  schedule:
    - cron: '5 20 * * 1-5'   # Mon-Fri 4:05 PM ET
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run close mode
        run: python -m src.daily_options_agent --mode=close
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: close-report
          path: |
            report.md
            gex_heatmap_*.png
