name: Close Run (4:00 PM ET / 1:00 PM PT)
on:
  schedule:
    # 16:00 ET = market close = 1:00 PM Pacific. Dual UTC crons (one per DST offset);
    # the close gate keys off the cron's scheduled ET hour (16), so the off-season
    # duplicate self-skips and exactly one run fires at the close year-round.
    - cron: '0 20 * * 1-5'    # 16:00 ET during EDT (summer) = 1:00 PM PT
    - cron: '0 21 * * 1-5'    # 16:00 ET during EST (winter) = 1:00 PM PT
  workflow_dispatch:
    inputs:
      force:
        description: 'Bypass the trading-day / ET-hour guard (run now regardless)'
        type: boolean
        default: true
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run close mode
        run: python -m src.daily_options_agent --mode=close ${{ (github.event_name == 'workflow_dispatch' && inputs.force) && '--force' || '' }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.OPTIONS_DISCORD_WEBHOOK_URL }}
          SCHEDULED_CRON: ${{ github.event.schedule }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: close-report
          path: |
            report.md
            gex_heatmap_*.png
      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.OPTIONS_DISCORD_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -sf -H "Content-Type: application/json" -X POST \
            -d "{\"content\": \"❌ Close screener run failed — see $RUN_URL\"}" \
            "$DISCORD_WEBHOOK_URL" || true
